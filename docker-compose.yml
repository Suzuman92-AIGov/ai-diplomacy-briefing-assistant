services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_diplomacy_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidiplomacy
    ports:
      - "5432:5432"
    volumes:
      - ai_diplomacy_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

volumes:
  ai_diplomacy_pgdata:
